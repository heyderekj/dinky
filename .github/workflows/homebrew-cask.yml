# release.sh pushes the cask to main *before* gh release create uploads the zip.
# brew audit --cask --strict fetches the url — it will 404 until the release exists.
# Run style on every cask/PR change; run strict audit only after a release is published.
#
# Tap the repo and use the cask name (not Casks/dinky.rb): recent Homebrew disables
# brew audit / brew style on raw paths.

name: Homebrew cask

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - Casks/dinky.rb
      - .github/workflows/homebrew-cask.yml
  pull_request:
    paths:
      - Casks/dinky.rb
      - .github/workflows/homebrew-cask.yml
  workflow_dispatch:

concurrency:
  group: homebrew-cask-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cask:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: tap this repo
        run: brew tap heyderekj/dinky "$GITHUB_WORKSPACE"
      - name: style
        run: brew style --cask dinky
      - name: strict audit (zip must exist on GitHub)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        run: brew audit --cask --strict dinky
