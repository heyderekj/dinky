openapi: 3.1.0
info:
  title: Dinky
  version: "0.0.0"
  description: |
    dinkyfiles.com is a static marketing site: there is no public HTTP API here (paths below are empty).

    Separately, the Dinky *product* in the open-source repository includes an optional local-only `dinky serve`
    command (loopback HTTP on the user's Mac) for images. That interface is not hosted on dinkyfiles.com; see
    the repo file `docs/local-cli.md` for the JSON schema (`dinky.image.compress/1.0.0`) and example requests.

    This document exists for machine-readable discovery of the *website* (RFC 9727 service-desc, empty paths).
paths: {}
